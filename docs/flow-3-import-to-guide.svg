<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="940" viewBox="0 0 1500 940">
  <defs>
    <linearGradient id="bg3" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fffaf2" />
      <stop offset="100%" stop-color="#fff1e3" />
    </linearGradient>
    <linearGradient id="card3" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fffefc" />
      <stop offset="100%" stop-color="#fff7ef" />
    </linearGradient>
    <linearGradient id="accent3" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#ffb66d" />
      <stop offset="100%" stop-color="#ff7f34" />
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#e7b58a" flood-opacity="0.28" />
    </filter>
    <marker id="arrow3" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#d97832" />
    </marker>
    <style>
      .title { font: 700 34px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #5a2d10; }
      .subtitle { font: 500 18px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #8c5d3b; }
      .card-title { font: 700 24px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #5b3216; }
      .card-text { font: 500 18px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #7b5638; }
      .tag { font: 700 15px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #ffffff; }
      .branch { font: 700 18px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #c56221; }
    </style>
  </defs>

  <rect width="1500" height="940" rx="28" fill="url(#bg3)" />
  <text x="84" y="78" class="title">流程 3：导入视频 / 文档并生成攻略</text>
  <text x="84" y="112" class="subtitle">展示用户从粘贴外部链接开始，到生成结构化菜谱、进入详情页与跟做模式的完整导入链路</text>

  <rect x="84" y="160" width="240" height="120" rx="28" fill="url(#accent3)" filter="url(#shadow3)" />
  <text x="116" y="215" class="card-title" fill="#fff">1 进入导入页</text>
  <text x="116" y="248" class="card-text" fill="#fff7ef">选择视频链接或文档链接</text>

  <rect x="388" y="160" width="240" height="120" rx="28" fill="url(#card3)" filter="url(#shadow3)" />
  <text x="420" y="215" class="card-title">2 粘贴链接并提交</text>
  <text x="420" y="248" class="card-text">前端发起导入请求</text>

  <rect x="692" y="160" width="260" height="120" rx="28" fill="url(#card3)" filter="url(#shadow3)" />
  <text x="724" y="215" class="card-title">3 后端识别来源类型</text>
  <text x="724" y="248" class="card-text">区分视频与文档处理路径</text>

  <rect x="1040" y="130" width="320" height="170" rx="32" fill="#fff5eb" stroke="#f0c59d" stroke-width="2" />
  <text x="1080" y="188" class="card-title">解析分流</text>
  <text x="1080" y="226" class="card-text">A. 文档：提取正文、标题、段落结构</text>
  <text x="1080" y="258" class="card-text">B. 视频：提取页面信息、字幕或音频</text>

  <rect x="1060" y="420" width="260" height="120" rx="28" fill="url(#card3)" filter="url(#shadow3)" />
  <text x="1092" y="475" class="card-title">4A 文档内容提取</text>
  <text x="1092" y="508" class="card-text">抓取正文与结构化片段</text>

  <rect x="736" y="420" width="260" height="120" rx="28" fill="url(#card3)" filter="url(#shadow3)" />
  <text x="768" y="475" class="card-title">4B 视频字幕获取</text>
  <text x="768" y="508" class="card-text">优先读取平台字幕与元信息</text>

  <rect x="412" y="420" width="260" height="120" rx="28" fill="url(#card3)" filter="url(#shadow3)" />
  <text x="444" y="468" class="card-title">5 可选 Whisper 转写</text>
  <text x="444" y="503" class="card-text">字幕不足时抓音频做 ASR</text>

  <rect x="84" y="420" width="260" height="120" rx="28" fill="url(#card3)" filter="url(#shadow3)" />
  <text x="116" y="475" class="card-title">6 整理原始素材</text>
  <text x="116" y="508" class="card-text">合并文本、标题、标签与来源</text>

  <rect x="84" y="660" width="260" height="120" rx="28" fill="url(#card3)" filter="url(#shadow3)" />
  <text x="116" y="708" class="card-title">7 生成结构化攻略</text>
  <text x="116" y="742" class="card-text">产出菜谱、步骤、提示与标签</text>

  <rect x="412" y="660" width="260" height="120" rx="28" fill="url(#card3)" filter="url(#shadow3)" />
  <text x="444" y="708" class="card-title">8 写入数据库</text>
  <text x="444" y="742" class="card-text">保存为可复用菜谱记录</text>

  <rect x="736" y="660" width="260" height="120" rx="28" fill="url(#card3)" filter="url(#shadow3)" />
  <text x="768" y="708" class="card-title">9 前端展示结果</text>
  <text x="768" y="742" class="card-text">导入成功后预览生成内容</text>

  <rect x="1060" y="660" width="260" height="120" rx="28" fill="url(#card3)" filter="url(#shadow3)" />
  <text x="1092" y="708" class="card-title">10 进入详情 / 跟做</text>
  <text x="1092" y="742" class="card-text">接入主流程继续完成</text>

  <rect x="1280" y="650" width="160" height="140" rx="28" fill="#fff5eb" stroke="#f0c59d" stroke-width="2" />
  <text x="1308" y="700" class="card-title">交互价值</text>
  <text x="1308" y="734" class="card-text">把外部内容</text>
  <text x="1308" y="762" class="card-text">变成可执行攻略</text>

  <line x1="324" y1="220" x2="388" y2="220" stroke="#d97832" stroke-width="5" marker-end="url(#arrow3)" />
  <line x1="628" y1="220" x2="692" y2="220" stroke="#d97832" stroke-width="5" marker-end="url(#arrow3)" />
  <line x1="952" y1="220" x2="1040" y2="220" stroke="#d97832" stroke-width="5" marker-end="url(#arrow3)" />

  <path d="M1184 300 C1184 350, 1190 382, 1190 420" fill="none" stroke="#d97832" stroke-width="5" marker-end="url(#arrow3)" />
  <path d="M1110 300 C1040 350, 955 390, 866 420" fill="none" stroke="#d97832" stroke-width="5" marker-end="url(#arrow3)" />
  <text x="1206" y="364" class="branch">文档</text>
  <text x="980" y="356" class="branch">视频</text>

  <line x1="736" y1="480" x2="672" y2="480" stroke="#d97832" stroke-width="5" marker-end="url(#arrow3)" />
  <line x1="412" y1="480" x2="344" y2="480" stroke="#d97832" stroke-width="5" marker-end="url(#arrow3)" />
  <path d="M1060 480 C980 540, 820 550, 344 480" fill="none" stroke="#f0a05a" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrow3)" />
  <text x="814" y="560" class="branch">解析结果统一汇入原始素材池</text>

  <path d="M214 540 C214 590, 214 620, 214 660" fill="none" stroke="#d97832" stroke-width="5" marker-end="url(#arrow3)" />
  <line x1="344" y1="720" x2="412" y2="720" stroke="#d97832" stroke-width="5" marker-end="url(#arrow3)" />
  <line x1="672" y1="720" x2="736" y2="720" stroke="#d97832" stroke-width="5" marker-end="url(#arrow3)" />
  <line x1="996" y1="720" x2="1060" y2="720" stroke="#d97832" stroke-width="5" marker-end="url(#arrow3)" />
  <line x1="1320" y1="720" x2="1280" y2="720" stroke="#d97832" stroke-width="5" marker-end="url(#arrow3)" />

  <rect x="1140" y="88" width="300" height="40" rx="20" fill="#fff0df" stroke="#f0c59d" />
  <text x="1164" y="114" class="tag" fill="#c86a26">核心特色：把外部视频 / 文档转换成结构化跟做攻略</text>
</svg>
